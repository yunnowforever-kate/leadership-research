<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>리서치 자동화</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
    * { font-family: 'Noto Sans KR', sans-serif; }
    #log-box { scrollbar-width: thin; scrollbar-color: #4b5563 #111827; }
    #log-box::-webkit-scrollbar { width: 6px; }
    #log-box::-webkit-scrollbar-track { background: #111827; }
    #log-box::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 3px; }
    .phase-active { border-color: #3b82f6 !important; color: #93c5fd !important; background: #1e3a5f33 !important; }
    .phase-done   { border-color: #10b981 !important; color: #6ee7b7 !important; background: #064e3b33 !important; }
    @keyframes pulse-ring { 0%,100%{opacity:1} 50%{opacity:.4} }
    .pulsing { animation: pulse-ring 1.4s ease-in-out infinite; }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">

  <header class="border-b border-gray-800 bg-gray-900">
    <div class="max-w-3xl mx-auto px-6 py-5 flex items-center gap-4">
      <div class="w-10 h-10 rounded-xl bg-blue-600 flex items-center justify-center text-xl">📊</div>
      <div>
        <h1 class="text-lg font-bold text-white">리서치 자동화</h1>
        <p class="text-xs text-gray-400">AI Research Report Generator</p>
      </div>
    </div>
  </header>

  <main class="max-w-3xl mx-auto px-6 py-8 space-y-5">

    <!-- 주제 입력 (메인) -->
    <div class="bg-gray-900 border border-gray-700 rounded-2xl p-6">
      <label class="block text-sm font-semibold text-white mb-2">리서치 주제</label>
      <input id="topic" type="text"
        placeholder="예: 리더십 모델링, 조직문화 혁신, 디지털 트랜스포메이션"
        class="w-full bg-gray-800 border border-gray-600 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-blue-500 transition text-sm" />
      <p class="mt-2 text-xs text-gray-500">한국어 또는 영어로 입력하세요</p>
    </div>

    <!-- API Key (접이식) -->
    <details class="bg-gray-900 border border-gray-800 rounded-2xl">
      <summary class="px-6 py-4 cursor-pointer text-sm text-gray-400 hover:text-gray-200 select-none">
        🔑 Anthropic API Key 설정
      </summary>
      <div class="px-6 pb-5">
        <div class="flex gap-3 mt-2">
          <input id="api-key" type="password" placeholder="sk-ant-..."
            class="flex-1 bg-gray-800 border border-gray-700 rounded-xl px-4 py-2.5 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-blue-500 transition" />
          <button onclick="document.getElementById('api-key').type = document.getElementById('api-key').type==='password'?'text':'password'"
            class="px-4 py-2.5 bg-gray-700 hover:bg-gray-600 rounded-xl text-sm transition">보기</button>
        </div>
        <p class="mt-2 text-xs text-gray-500">.env에 저장된 경우 비워두세요</p>
      </div>
    </details>

    <!-- 단계 표시 -->
    <div class="grid grid-cols-3 gap-3">
      <div class="phase-card border border-gray-700 rounded-xl p-4 text-center transition-all duration-300" data-phase="1">
        <div class="text-2xl mb-1">🔍</div>
        <div class="text-xs text-gray-500 font-medium">Phase 1</div>
        <div class="text-xs text-gray-300 mt-0.5">논문·HBR·강의 검색</div>
      </div>
      <div class="phase-card border border-gray-700 rounded-xl p-4 text-center transition-all duration-300" data-phase="2">
        <div class="text-2xl mb-1">🤖</div>
        <div class="text-xs text-gray-500 font-medium">Phase 2</div>
        <div class="text-xs text-gray-300 mt-0.5">Claude AI 분석</div>
      </div>
      <div class="phase-card border border-gray-700 rounded-xl p-4 text-center transition-all duration-300" data-phase="3">
        <div class="text-2xl mb-1">📄</div>
        <div class="text-xs text-gray-500 font-medium">Phase 3</div>
        <div class="text-xs text-gray-300 mt-0.5">Word 문서 생성</div>
      </div>
    </div>

    <!-- 실행 버튼 -->
    <button id="run-btn" onclick="startRun()"
      class="w-full py-4 bg-blue-600 hover:bg-blue-500 active:bg-blue-700 rounded-2xl font-bold text-lg transition-all shadow-lg shadow-blue-900/30">
      ▶ 리서치 시작
    </button>

    <!-- 진행 로그 -->
    <div id="log-section" class="hidden bg-gray-900 border border-gray-800 rounded-2xl overflow-hidden">
      <div class="flex items-center justify-between px-5 py-3 border-b border-gray-800">
        <span class="text-sm font-medium text-gray-300">실행 로그</span>
        <span id="status-badge" class="text-xs px-2.5 py-1 rounded-full bg-blue-900 text-blue-300 pulsing">실행 중</span>
      </div>
      <div id="log-box" class="h-72 overflow-y-auto p-4 space-y-0.5 font-mono text-xs bg-gray-950 leading-relaxed"></div>
    </div>

    <!-- 다운로드 -->
    <div id="download-section" class="hidden space-y-3">
      <button onclick="downloadFile('docx')"
        class="flex items-center justify-center gap-3 w-full py-4 bg-emerald-700 hover:bg-emerald-600 rounded-2xl font-bold text-lg transition-all shadow-lg shadow-emerald-900/30">
        ⬇ <span id="dl-docx-name">Word 보고서 다운로드 (.docx)</span>
      </button>
      <button onclick="downloadFile('pptx')"
        class="flex items-center justify-center gap-3 w-full py-4 bg-blue-700 hover:bg-blue-600 rounded-2xl font-bold text-lg transition-all shadow-lg shadow-blue-900/30">
        ⬇ <span id="dl-pptx-name">PPT 프레젠테이션 다운로드 (.pptx)</span>
      </button>
    </div>

    <!-- 오류 -->
    <div id="error-section" class="hidden bg-red-950 border border-red-800 rounded-2xl p-5">
      <p class="text-sm font-semibold text-red-400 mb-1">오류 발생</p>
      <p id="error-msg" class="text-xs text-red-300 font-mono break-all"></p>
    </div>

  </main>

  <script>
    let es = null;
    let files = {};  // { docx: {b64, name}, pptx: {b64, name} }

    function startRun() {
      const topic  = document.getElementById('topic').value.trim();
      const apiKey = document.getElementById('api-key').value.trim();

      if (!topic) {
        alert('리서치 주제를 입력해주세요');
        return;
      }

      // 초기화
      if (es) { es.close(); es = null; }
      fileB64 = null; fileName = null;
      document.getElementById('log-box').innerHTML = '';
      document.getElementById('log-section').classList.remove('hidden');
      document.getElementById('download-section').classList.add('hidden');
      document.getElementById('error-section').classList.add('hidden');
      document.querySelectorAll('.phase-card').forEach(el => el.classList.remove('phase-active','phase-done'));

      const badge = document.getElementById('status-badge');
      badge.textContent = '실행 중';
      badge.className = 'text-xs px-2.5 py-1 rounded-full bg-blue-900 text-blue-300 pulsing';

      setBtn(true);

      // POST → SSE 응답 받기
      fetch('/api/run', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ topic, api_key: apiKey }),
      }).then(res => {
        if (!res.ok) return res.json().then(d => { throw new Error(d.error || '실행 실패'); });
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buf = '';

        function read() {
          reader.read().then(({ done, value }) => {
            if (done) { setBtn(false); return; }
            buf += decoder.decode(value, { stream: true });
            const parts = buf.split('\n\n');
            buf = parts.pop();
            parts.forEach(part => {
              if (part.startsWith('data: ')) {
                try { handleEvent(JSON.parse(part.slice(6))); } catch(e) {}
              }
            });
            read();
          });
        }
        read();
      }).catch(err => {
        showError(err.message);
        setBtn(false);
      });
    }

    function handleEvent(data) {
      if (data.type === 'log') {
        appendLog(data.m);
      } else if (data.type === 'phase') {
        setPhase(data.n);
        appendLog(`▶ Phase ${data.n} | ${data.label}`, 'blue');
      } else if (data.type === 'done') {
        const badge = document.getElementById('status-badge');
        if (data.success) {
          badge.textContent = '완료';
          badge.className = 'text-xs px-2.5 py-1 rounded-full bg-emerald-900 text-emerald-300';
          document.querySelectorAll('.phase-card').forEach(el => el.classList.add('phase-done'));
          files.docx = { b64: data.docx_b64, name: data.docx_filename };
          files.pptx = { b64: data.pptx_b64, name: data.pptx_filename };
          document.getElementById('dl-docx-name').textContent = data.docx_filename || 'Word 보고서 (.docx)';
          document.getElementById('dl-pptx-name').textContent = data.pptx_filename || 'PPT 프레젠테이션 (.pptx)';
          document.getElementById('download-section').classList.remove('hidden');
          appendLog(`✓ 완료! DOCX + PPTX 생성됨`, 'green');
        } else {
          badge.textContent = '오류';
          badge.className = 'text-xs px-2.5 py-1 rounded-full bg-red-900 text-red-300';
          showError(data.error || '알 수 없는 오류');
          appendLog(`✗ ${data.error}`, 'red');
        }
        setBtn(false);
      }
    }

    function appendLog(msg, color) {
      const box = document.getElementById('log-box');
      const line = document.createElement('div');
      const colors = { blue:'text-blue-400 font-semibold mt-1', green:'text-emerald-400 font-semibold',
                       red:'text-red-400', yellow:'text-yellow-400', purple:'text-purple-400' };
      let cls = colors[color] || 'text-gray-400';
      if (!color) {
        if (msg.includes('[논문') || msg.includes('[HBR') || msg.includes('[MOOC')) cls = 'text-yellow-400';
        else if (msg.includes('[통합') || msg.includes('[DOCX')) cls = 'text-purple-400';
        else if (msg.startsWith('✓')) cls = 'text-emerald-400 font-semibold';
        else if (msg.startsWith('✗') || msg.includes('오류')) cls = 'text-red-400';
      }
      line.className = cls;
      line.textContent = msg;
      box.appendChild(line);
      box.scrollTop = box.scrollHeight;
    }

    function setPhase(n) {
      document.querySelectorAll('.phase-card').forEach(el => {
        const p = parseInt(el.dataset.phase);
        if (p < n) el.classList.add('phase-done');
        else if (p === n) { el.classList.remove('phase-done'); el.classList.add('phase-active'); }
      });
    }

    function showError(msg) {
      document.getElementById('error-msg').textContent = msg;
      document.getElementById('error-section').classList.remove('hidden');
    }

    function setBtn(running) {
      const btn = document.getElementById('run-btn');
      btn.disabled = running;
      btn.textContent = running ? '⏳ 실행 중...' : '▶ 리서치 시작';
      btn.className = running
        ? 'w-full py-4 bg-gray-700 rounded-2xl font-bold text-lg cursor-not-allowed'
        : 'w-full py-4 bg-blue-600 hover:bg-blue-500 active:bg-blue-700 rounded-2xl font-bold text-lg transition-all shadow-lg shadow-blue-900/30';
    }

    function downloadFile(type) {
      const f = files[type];
      if (!f || !f.b64) return;
      const mime = type === 'pptx'
        ? 'application/vnd.openxmlformats-officedocument.presentationml.presentation'
        : 'application/vnd.openxmlformats-officedocument.wordprocessingml.document';
      const binary = atob(f.b64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      const blob = new Blob([bytes], { type: mime });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = f.name; a.click();
      URL.revokeObjectURL(url);
    }
  </script>
</body>
</html>
